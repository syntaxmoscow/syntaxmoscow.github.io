<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Синтакс</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f7f7f5;
      color: #000;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      position: relative;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
    }

    /* Центр */
    .center-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 70vh;
      text-align: center;
    }

    .center-content p {
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .center-content a.button {
      background-color: black;
      color: white;
      padding: 1rem 2rem;
      border-radius: 5px;
      text-decoration: none;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }

    .center-content a.button:hover {
      background-color: #333;
    }

    /* Мобильный вид */
    @media (max-width: 600px) {
      nav {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 4.5rem;
        right: 2rem;
        background-color: #f7f7f5;
        padding: 1rem;
        border: 1px solid #ccc;
        z-index: 1000;
      }

      nav.open {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Синтакс</div>
    <div class="menu-toggle" id="menuToggle">&#9776;</div>
    <nav id="navMenu">
      <a href="services.html">Услуги</a>
      <a href="about.html">О себе</a>
      <a href="cases.html">Кейсы</a>
    </nav>
  </header>

  <main class="center-content">
    <p>Синтакс — не просто реклама. Это язык, на котором говорят ваши клиенты.</p>
    <a class="button" href="https://t.me/w3bspy" target="_blank">Написать</a>
  </main>

  <script>
    const toggle = document.getElementById('menuToggle');
    const menu = document.getElementById('navMenu');

    toggle.addEventListener('click', () => {
      menu.classList.toggle('open');
    });
  </script>
</body>
</html>
